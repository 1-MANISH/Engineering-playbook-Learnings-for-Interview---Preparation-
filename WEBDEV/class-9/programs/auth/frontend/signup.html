<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Notes | Signup</title>

        <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script></head>
<body>

        <div class="container">
                <div class="inputs">
                        <input type="text" id="username" placeholder="Username">
                        <input type="password" id="password" placeholder="Password">
                        <button onclick="SignupHandler()">Signup</button>
                </div>
        </div>

        <script>
                  const axiosInstance = axios.create({
                        baseURL:"http://localhost:3000",
                })

                async function SignupHandler(){
                        try {
                                const username = document.querySelector('#username').value
                                const password = document.querySelector('#password').value
                                if(!username || !password) return
                                const response = await axiosInstance.post('/signup', {username, password})
                                window.location.href = '/login'
                        } catch (error) {
                               console.log('Error in SigninHandler', error) 
                        }
                }
                
        </script>
        
</body>
</html>
